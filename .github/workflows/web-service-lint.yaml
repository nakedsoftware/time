# web-service-lint.yaml
#
# This GitHub Actions workflow will use the golangci-lint tool to scan the
# web application service for issues.

name: Lint Web Application Service

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/web-service-lint.yaml
      - src/web/service/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/web-service-lint.yaml
      - src/web/service/**

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint Web Application Service
    runs-on: ubuntu-24.04
    steps:
      - name: Check Out Source Code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.work.sum
            src/web/service/go.sum
      - name: Lint Source Code
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: src/web/service
